name: Create Issues from Tasks

on:
  schedule:
    # Run daily at 9 AM UTC
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      issue_count:
        description: 'Number of issues to create (default: 1 for testing, 5 for daily)'
        required: false
        default: '1'

jobs:
  create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Create Issues from Tasks
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT }}
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Read the tasks.md file
            const tasksPath = path.join(process.env.GITHUB_WORKSPACE, 'docs', 'tasks.md');
            const tasksContent = fs.readFileSync(tasksPath, 'utf8');
            
            // Parse tasks from the markdown file - updated regex for Issue #X format
            const taskRegex = /### Issue #(\d+): (.+?)\n\*\*Priority\*\*: (.+?)\s*\n\*\*Type\*\*: (.+?)\s*\n\*\*Description\*\*: (.+?)\n\*\*Tasks\*\*:([\s\S]*?)(?=\n---|\n###|$)/g;
            const tasks = [];
            let match;
            
            while ((match = taskRegex.exec(tasksContent)) !== null) {
              const issueNumber = parseInt(match[1]);
              // Start from issue #1
              if (issueNumber >= 1) {
                // Extract task items from the Tasks section
                const taskItems = match[6].trim()
                  .split('\n')
                  .filter(line => line.trim().startsWith('-'))
                  .map(line => line.trim())
                  .join('\n');
                
                tasks.push({
                  id: `Issue #${issueNumber}`,
                  issueNumber: issueNumber,
                  title: match[2],
                  priority: match[3],
                  type: match[4],
                  description: match[5],
                  tasks: taskItems
                });
              }
            }
            
            // Sort tasks by issue number to process them in order
            tasks.sort((a, b) => a.issueNumber - b.issueNumber);
            
            // Get existing issues to avoid duplicates
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              per_page: 100
            });
            
            const existingTitles = existingIssues.data.map(issue => issue.title);
            
            // Filter out tasks that already have issues
            const newTasks = tasks.filter(task => 
              !existingTitles.includes(task.title) &&
              !existingTitles.includes(`${task.id}: ${task.title}`)
            );
            
            // Determine how many issues to create
            const issueCount = context.eventName === 'schedule' ? 5 : parseInt('${{ github.event.inputs.issue_count }}' || '1');
            const tasksToCreate = newTasks.slice(0, Math.min(issueCount, newTasks.length));
            
            if (tasksToCreate.length === 0) {
              console.log('No new tasks to create issues for');
              return;
            }
            
            // Get milestone (if exists)
            let milestoneNumber = null;
            try {
              const milestones = await github.rest.issues.listMilestones({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open'
              });
              // Use the first open milestone or search for specific one
              if (milestones.data.length > 0) {
                // You can customize this to find a specific milestone by name
                const targetMilestone = milestones.data.find(m => 
                  m.title.includes('MVP') || m.title.includes('Milestone 1')
                );
                milestoneNumber = targetMilestone ? targetMilestone.number : milestones.data[0].number;
              }
            } catch (error) {
              console.log('No milestone found:', error.message);
            }
            
            // Create issues for selected tasks
            for (const task of tasksToCreate) {
              try {
                // Format the issue body without Priority and Type (they'll be labels)
                const issueBody = `**Description**: ${task.description}\n\n**Tasks**:\n${task.tasks}`;
                
                const issueData = {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: task.title,
                  body: issueBody
                };
                
                // Add milestone if available
                if (milestoneNumber) {
                  issueData.milestone = milestoneNumber;
                }
                
                const issue = await github.rest.issues.create(issueData);
                
                console.log(`Created issue #${issue.data.number}: ${task.title}`);
                
                // Add to project and set custom fields using GraphQL (if project exists)
                try {
                  // Use GraphQL to add to Projects v2 and set custom fields
                  const projectQuery = await github.graphql(`
                    query {
                      repository(owner: "${context.repo.owner}", name: "${context.repo.repo}") {
                        projectsV2(first: 10) {
                          nodes {
                            id
                            title
                            fields(first: 20) {
                              nodes {
                                ... on ProjectV2Field {
                                  id
                                  name
                                }
                                ... on ProjectV2SingleSelectField {
                                  id
                                  name
                                  options {
                                    id
                                    name
                                  }
                                }
                              }
                            }
                          }
                        }
                      }
                      organization(login: "${context.repo.owner}") {
                        projectsV2(first: 10) {
                          nodes {
                            id
                            title
                            fields(first: 20) {
                              nodes {
                                ... on ProjectV2Field {
                                  id
                                  name
                                }
                                ... on ProjectV2SingleSelectField {
                                  id
                                  name
                                  options {
                                    id
                                    name
                                  }
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  `);
                  
                  // Try to find project in repository first, then organization
                  let project = null;
                  if (projectQuery.repository && projectQuery.repository.projectsV2) {
                    project = projectQuery.repository.projectsV2.nodes.find(p => 
                      p.title.toLowerCase().includes('development') || 
                      p.title.toLowerCase().includes('cli')
                    );
                  }
                  
                  if (!project && projectQuery.organization && projectQuery.organization.projectsV2) {
                    project = projectQuery.organization.projectsV2.nodes.find(p => 
                      p.title.toLowerCase().includes('development') || 
                      p.title.toLowerCase().includes('cli')
                    );
                  }
                  
                  if (project) {
                    // Add issue to project
                    const addResult = await github.graphql(`
                      mutation {
                        addProjectV2ItemById(input: {
                          projectId: "${project.id}"
                          contentId: "${issue.data.node_id}"
                        }) {
                          item {
                            id
                          }
                        }
                      }
                    `);
                    
                    const itemId = addResult.addProjectV2ItemById.item.id;
                    
                    // Find the Type field and set it based on task type
                    const typeField = project.fields.nodes.find(f => f.name === 'Type');
                    if (typeField && typeField.options) {
                      // Map task type to project field option
                      let optionName = task.type;
                      if (task.type.toLowerCase() === 'setup') {
                        optionName = 'Setup';
                      } else if (task.type.toLowerCase() === 'feature') {
                        optionName = 'Feature';
                      } else if (task.type.toLowerCase() === 'configuration') {
                        optionName = 'Configuration';
                      } else if (task.type.toLowerCase() === 'ci/cd') {
                        optionName = 'CI/CD';
                      } else if (task.type.toLowerCase() === 'documentation') {
                        optionName = 'Documentation';
                      } else if (task.type.toLowerCase() === 'testing') {
                        optionName = 'Testing';
                      } else if (task.type.toLowerCase() === 'optimization') {
                        optionName = 'Optimization';
                      }
                      
                      const typeOption = typeField.options.find(o => 
                        o.name.toLowerCase() === optionName.toLowerCase()
                      );
                      
                      if (typeOption) {
                        // Set the Type field
                        await github.graphql(`
                          mutation {
                            updateProjectV2ItemFieldValue(input: {
                              projectId: "${project.id}"
                              itemId: "${itemId}"
                              fieldId: "${typeField.id}"
                              value: {
                                singleSelectOptionId: "${typeOption.id}"
                              }
                            }) {
                              projectV2Item {
                                id
                              }
                            }
                          }
                        `);
                        console.log(`Set Type to ${typeOption.name} in project`);
                      }
                    }
                    
                    // Find and set Priority field if it exists
                    const priorityField = project.fields.nodes.find(f => f.name === 'Priority');
                    if (priorityField && priorityField.options) {
                      const priorityOption = priorityField.options.find(o => 
                        o.name.toLowerCase() === task.priority.toLowerCase()
                      );
                      
                      if (priorityOption) {
                        await github.graphql(`
                          mutation {
                            updateProjectV2ItemFieldValue(input: {
                              projectId: "${project.id}"
                              itemId: "${itemId}"
                              fieldId: "${priorityField.id}"
                              value: {
                                singleSelectOptionId: "${priorityOption.id}"
                              }
                            }) {
                              projectV2Item {
                                id
                              }
                            }
                          }
                        `);
                        console.log(`Set Priority to ${priorityOption.name} in project`);
                      }
                    }
                    
                    console.log(`Added issue to project: ${project.title}`);
                  }
                } catch (error) {
                  console.log('Could not add to project or set custom fields:', error.message);
                }
                
                // Add a small delay to avoid rate limiting
                await new Promise(resolve => setTimeout(resolve, 1000));
              } catch (error) {
                console.error(`Failed to create issue for ${task.title}:`, error.message);
              }
            }
            
            console.log(`Successfully created ${tasksToCreate.length} issue(s)`);