# KubeOrch Core Configuration
# Generated by orchcli init — edit as needed

PORT: 3000
GIN_MODE: debug
LOG_LEVEL: info

# Database — points to the MongoDB started by orchcli
MONGO_URI: "mongodb://localhost:27017/kubeorchestra"

# Security — auto-generated secrets for local development
JWT_SECRET: "{{JWT_SECRET}}"
ENCRYPTION_KEY: "{{ENCRYPTION_KEY}}"

# Token settings
TOKEN_REFRESH_MAX_AGE_DAYS: 7

# URLs
BASE_URL: "http://localhost:3000"
FRONTEND_URL: "http://localhost:3001"

# Cluster log retention
CLUSTER_LOG_TTL_HOURS: 24

# Invite system
REGENERATE_INVITE_AFTER_SIGNUP: true
