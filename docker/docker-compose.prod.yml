version: '3.8'

networks:
  kubeorchestra-net:
    driver: bridge
    name: kubeorchestra-network

services:
  mongodb:
    image: mongo:8.0
    container_name: kubeorchestra-mongodb
    restart: unless-stopped
    networks:
      - kubeorchestra-net
    environment:
      MONGO_INITDB_DATABASE: kubeorchestra
    ports:
      - "27017:27017"
    expose:
      - "27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  core:
    image: ghcr.io/kubeorchestra/core:latest
    container_name: kubeorchestra-core
    restart: unless-stopped
    networks:
      - kubeorchestra-net
    ports:
      - "3000:3000"
    expose:
      - "3000"
    environment:
      MONGO_URI: mongodb://mongodb:27017/kubeorchestra
      MONGO_DB_NAME: kubeorchestra
    depends_on:
      mongodb:
        condition: service_healthy

  ui:
    image: ghcr.io/kubeorchestra/ui:latest
    container_name: kubeorchestra-ui
    restart: unless-stopped
    networks:
      - kubeorchestra-net
    ports:
      - "3001:3001"
    expose:
      - "3001"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
      API_URL_INTERNAL: http://core:3000
    depends_on:
      - core

volumes:
  mongodb_data:
    name: kubeorchestra_mongodb_data
  mongodb_config:
    name: kubeorchestra_mongodb_config