version: '3.8'

# Hybrid UI mode - UI runs on host, Core from Docker image
# PostgreSQL and Core run in Docker

networks:
  kubeorchestra-net:
    driver: bridge
    name: kubeorchestra-network-hybrid

services:
  postgres:
    image: postgres:14
    container_name: kubeorchestra-postgres-hybrid
    restart: unless-stopped
    networks:
      - kubeorchestra-net
    environment:
      POSTGRES_DB: kubeorchestra
      POSTGRES_USER: kubeorchestra
      POSTGRES_PASSWORD: kubeorchestra
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kubeorchestra -d kubeorchestra"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  core:
    image: ghcr.io/kubeorchestra/core:latest
    container_name: kubeorchestra-core-hybrid
    restart: unless-stopped
    networks:
      - kubeorchestra-net
    ports:
      - "3000:3000"
    environment:
      DB_HOST: postgres
      DB_NAME: kubeorchestra
      DB_USER: kubeorchestra
      DB_PASSWORD: kubeorchestra
      DB_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy

# UI runs on host: cd ui && npm install && npm run dev (port 3001)
# UI connects to Core at localhost:3000

volumes:
  postgres_data:
    name: kubeorchestra_postgres_data_hybrid