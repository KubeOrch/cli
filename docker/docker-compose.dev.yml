version: '3.8'

# Development mode - both UI and Core run on host
# Only PostgreSQL runs in Docker

services:
  postgres:
    image: postgres:14
    container_name: kubeorchestra-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: kubeorchestra
      POSTGRES_USER: kubeorchestra
      POSTGRES_PASSWORD: kubeorchestra
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kubeorchestra -d kubeorchestra"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

# UI runs on host: cd ui && npm install && npm run dev (port 3001)
# Core runs on host: cd core && air (port 3000)
# Both connect to PostgreSQL at localhost:5432

volumes:
  postgres_data:
    name: kubeorchestra_postgres_data_dev